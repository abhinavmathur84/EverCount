name: EverCount
options:
  bundleIdPrefix: com.evercount
  deploymentTarget:
    iOS: "17.0"
schemes:
  EverCount:
    build:
      targets:
        Daysie: all
        DaysieWidget: [build]
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
  DaysieWidget:
    build:
      targets:
        DaysieWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: DaysieSmallWidget
    archive:
      config: Release
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"
targets:
  Daysie:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Daysie
    resources:
      - path: Daysie/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evercount.app
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: Daysie/Info.plist
        DEVELOPMENT_TEAM: LT86UVZAL7
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - target: DaysieWidget
        embed: true
    entitlements:
      path: Daysie/Daysie.entitlements
  DaysieWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaysieWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evercount.app.widget
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: DaysieWidget/Info.plist
        DEVELOPMENT_TEAM: LT86UVZAL7
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: DaysieWidget/DaysieWidget.entitlements
