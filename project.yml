name: Daysie
options:
  bundleIdPrefix: com.daysie
  deploymentTarget:
    iOS: "17.0"
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"
targets:
  Daysie:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Daysie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daysie.app
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: Daysie/Info.plist
        DEVELOPMENT_TEAM: LT86UVZAL7
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 2
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - target: DaysieWidget
        embed: true
    entitlements:
      path: Daysie/Daysie.entitlements
  DaysieWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaysieWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daysie.app.widget
        SWIFT_VERSION: 5.0
        INFOPLIST_FILE: DaysieWidget/Info.plist
        DEVELOPMENT_TEAM: LT86UVZAL7
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 2
    entitlements:
      path: DaysieWidget/DaysieWidget.entitlements
